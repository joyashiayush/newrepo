<!DOCTYPE html>
<html>

<head>
<title>All Students</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
}

table{
margin:auto;
margin-top:40px;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px 20px;
border:1px solid #ddd;
}

th{
background:#667eea;
color:white;
}

button{
padding:6px 12px;
border:none;
border-radius:4px;
cursor:pointer;
}

.edit{
background:#4CAF50;
color:white;
}

.delete{
background:#e74c3c;
color:white;
}

canvas{
margin-top:40px;
}

</style>

</head>

<body>

<h2>All Student Records</h2>

<table>

<tr>
<th>Email</th>
<th>Marks</th>
<th>Attendance</th>
<th>Behaviour</th>
<th>Actions</th>
</tr>

{% for s in students %}

<tr>

<td>{{ s.student_email }}</td>
<td>{{ s.marks }}</td>
<td>{{ s.attendance }}</td>
<td>{{ s.behaviour }}</td>

<td>

<a href="/edit_student/{{ s.id }}">
<button class="edit">Edit</button>
</a>

<a href="/delete_student/{{ s.id }}">
<button class="delete">Delete</button>
</a>

</td>

</tr>

{% endfor %}

</table>


<br><br>

<h2>Student Ranking Chart</h2>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="rankChart" width="600" height="300"></canvas>

<script>

var labels = JSON.parse('{{ students | map(attribute="student_email") | list | tojson }}');
var marks = JSON.parse('{{ students | map(attribute="marks") | list | tojson }}');

var ctx = document.getElementById("rankChart");

new Chart(ctx, {

type: "bar",

data: {
labels: labels,

datasets: [{
label: "Student Marks",
data: marks,
backgroundColor: "#667eea"
}]
},

options:{
responsive:true,
scales:{
y:{
beginAtZero:true
}
}
}

});

</script>

<br><br>

<a href="/teacher_dashboard">Back</a>

</body>
</html>
